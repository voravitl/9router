name: CI

# Run on PRs and on master so docker-publish can require a green test gate.
on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: unit-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Repo does not commit package-lock.json — skip npm cache/lock-based ci.

      # Root deps first — tests import from src/ and open-sse/
      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install test dependencies
        working-directory: tests
        run: npm install --no-audit --no-fund

      # Focused smoke: new observability coverage + a small stable unit set.
      # Full suite is not all-green on a plain checkout (known-fails baseline);
      # do not use raw full vitest as a hard gate until known-fails is wired in CI.
      - name: Run unit smoke tests
        working-directory: tests
        run: |
          npx vitest run \
            unit/request-detail-token-stats.test.js \
            unit/capabilities.test.js \
            unit/dashboard-guard.test.js
