name: Build and Push Docker Image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: voravitl/888router

jobs:
  # Test gate: do not publish an image if unit smoke fails.
  # (Same smoke set as .github/workflows/ci.yml — keep in sync.)
  test:
    name: unit-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Repo does not commit package-lock.json — skip npm cache/lock-based ci.

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install test dependencies
        working-directory: tests
        run: npm install --no-audit --no-fund

      - name: Run unit smoke tests
        working-directory: tests
        run: |
          npx vitest run \
            unit/request-detail-token-stats.test.js \
            unit/capabilities.test.js \
            unit/dashboard-guard.test.js

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # Release tags: v0.10.1 → 0.10.1 (semver pattern strips leading v)
            type=semver,pattern={{version}}
            # Continuous deploy: every master push → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Traceability for branch/master builds
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
